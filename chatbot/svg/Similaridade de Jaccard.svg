<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 320" width="100%" height="100%">
    <style>
        text { font-family: sans-serif; }
    </style>

    <!-- Fundo -->
    <rect width="500" height="320" fill="#f5f5f5" rx="8" />

    <!-- Título -->
    <text x="250" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">Similaridade de Jaccard</text>

    <!-- Conjunto A -->
    <circle cx="195" cy="170" r="100" fill="#4CAF50" opacity="0.7" />

    <!-- Conjunto B -->
    <circle cx="305" cy="170" r="100" fill="#2196F3" opacity="0.7" />

    <!-- Interseção -->
    <clipPath id="clipA">
        <circle cx="195" cy="170" r="100" />
    </clipPath>
    <circle cx="305" cy="170" r="100" clip-path="url(#clipA)" fill="#FF9800" opacity="0.9" />

    <!-- Rótulos dos conjuntos -->
    <text x="145" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">A</text>
    <text x="145" y="185" text-anchor="middle" font-size="13" fill="#fff">|A|=5</text>

    <text x="355" y="165" text-anchor="middle" font-size="16" font-weight="bold" fill="#fff">B</text>
    <text x="355" y="185" text-anchor="middle" font-size="13" fill="#fff">|B|=6</text>

    <!-- Interseção -->
    <text x="250" y="165" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">A∩B</text>
    <text x="250" y="185" text-anchor="middle" font-size="18" font-weight="bold" fill="#fff">2</text>

    <!-- Fórmula -->
    <rect x="60" y="285" width="380" height="28" fill="#fff" rx="4" stroke="#ddd" />
    <text x="250" y="304" text-anchor="middle" font-size="14" fill="#333">
        J = |A∩B| / |A∪B| = 2 / 9 ≈
    </text>
    <text x="415" y="304" text-anchor="middle" font-size="14" font-weight="bold" fill="#d32f2f">0,22</text>
</svg>